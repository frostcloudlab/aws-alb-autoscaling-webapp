<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AWS ALB Auto Scaling Web App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;

    }

      border-radius: 12px;
      padding: 2rem;
      width: min(90%, 700px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    h1 {
      margin-top: 0;
      color: #f9fafb;
    }
    .meta {
      margin-top: 1.5rem;
      display: grid;
      gap: 0.75rem;
    }
    .meta div {
      padding: 0.75rem 1rem;
      background: #1f2937;
      border-radius: 8px;
    }
    .label {
      font-weight: bold;
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>AWS Highly Available Web App</h1>

    <div class="meta">
      <div><span class="label">Hostname:</span> __HOSTNAME__</div>
      <div><span class="label">Instance ID:</span> __INSTANCE_ID__</div>
      <div><span class="label">Availability Zone:</span> __AVAILABILITY_ZONE__</div>
